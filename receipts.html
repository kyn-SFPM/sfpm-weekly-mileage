<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  if(!params.has('_v')){
    params.set('_v', Date.now());
    window.location.replace(window.location.pathname + '?' + params.toString());
  }
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>SFPM — Log a Receipt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#121110; --panel:#1c1a17; --panel-alt:#242019;
    --steel:#3a362e; --steel-lt:#514b3e;
    --amber:#c98a3b; --amber-bright:#e0a855;
    --rust:#a63a2e; --rust-bright:#c4523f;
    --olive:#5c6b47; --olive-bright:#7c8f5f;
    --text:#ede7d9; --text-muted:#9c9483; --text-dim:#655f52;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:radial-gradient(ellipse at top, rgba(201,138,59,0.06), transparent 60%), var(--bg);
    color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;
  }
  .wrap{max-width:520px;margin:0 auto;padding:24px 18px 60px;}
  .hdr{padding:8px 4px 20px;border-bottom:1px solid var(--steel);margin-bottom:24px;position:relative;}
  .hdr::after{content:"";position:absolute;bottom:-1px;left:0;width:64px;height:3px;background:var(--amber);}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--amber);text-transform:uppercase;margin-bottom:6px;}
  h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:26px;letter-spacing:.02em;text-transform:uppercase;margin:0;}
  .sub{color:var(--text-muted);font-size:13px;margin-top:6px;}
  .nav{font-size:12px;margin-bottom:18px;}
  .nav a{color:var(--amber-bright);text-decoration:none;}

  label{display:block;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin:16px 0 5px;}
  input, select, textarea{
    width:100%;background:var(--panel-alt);border:1px solid var(--steel);border-radius:4px;color:var(--text);
    padding:12px 12px;font-family:'Inter',sans-serif;font-size:15px;
  }
  input:focus, select:focus, textarea:focus{outline:none;border-color:var(--amber);}
  input[type=file]{padding:10px;font-size:13px;}

  .preview{margin-top:10px;max-width:100%;border-radius:4px;border:1px solid var(--steel);display:none;}

  .btn{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;text-transform:uppercase;letter-spacing:.04em;
    padding:14px;border-radius:4px;border:none;cursor:pointer;width:100%;margin-top:22px;background:var(--amber);color:#1a1408;
  }
  .btn:disabled{opacity:.5;}

  .result{display:none;margin-top:26px;padding-top:20px;border-top:1px solid var(--steel);text-align:center;}
  .thanks{font-family:'Oswald',sans-serif;font-size:19px;text-transform:uppercase;}
  .msg{font-size:13px;color:var(--text-muted);margin-top:10px;line-height:1.5;}
  .err{display:none;color:var(--rust-bright);font-size:13px;margin-top:16px;}
  .again{display:none;margin-top:18px;background:transparent;border:1px solid var(--steel);color:var(--text-muted);}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="eyebrow">Service First Property Management</div>
    <h1>Log a Receipt</h1>
    <div class="sub">Snap the receipt, tell us what it was for.</div>
  </div>

  <form id="receiptForm">
    <label>Your Name</label>
    <input id="employee" required placeholder="First and last name">

    <label>Vehicle / Unit</label>
    <select id="unit" required><option value="">Loading roster…</option></select>

    <label>Photo of Receipt</label>
    <input id="photo" type="file" accept="image/*" required>
    <img id="preview" class="preview">

    <label>Service / Work Performed</label>
    <input id="serviceType" required placeholder="Oil change, brakes, etc.">

    <label>Mileage at Time of Service</label>
    <input id="serviceMileage" type="number" placeholder="e.g. 84210 (updates the fleet tracker automatically)">

    <div style="display:flex;gap:12px;">
      <div style="flex:1;"><label>Vendor</label><input id="vendor" placeholder="Shop name"></div>
      <div style="flex:1;"><label>Cost</label><input id="cost" placeholder="$"></div>
    </div>

    <label>Notes (optional)</label>
    <textarea id="notes" rows="2"></textarea>

    <button class="btn" type="submit" id="submitBtn">Submit Receipt</button>
    <div class="err" id="errBox"></div>
  </form>

  <div class="result" id="resultBox">
    <div class="thanks" id="thanksMsg"></div>
    <div class="msg">Logged to the SFPM Receipts sheet.</div>
  </div>

  <button class="btn again" id="againBtn">Log Another</button>
</div>

<script>
// ---- CONFIGURE THIS: same Apps Script Web App URL as the mileage form ----
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWrnauTI1Kva0YfT-jWyNH5vp5GwMK0wHlr5crl2IERtGbhMOT4Czl0vYAHBwhin9f-Q/exec";

const FALLBACK_UNITS = ["Unit 1","Unit 2","Unit 3","Unit 4","Unit 5","Unit 6","Unit 8","Unit 9","Unit 10","Unit 11","Unit 12","Unit 13","Unit 14","Unit 15","Unit 16","Unit 19","Unit 20","Unit 21","Unit 22","Unit 23","Unit 24","Unit 25","Unit 26","Unit 27","Unit 28","Unit 29","Unit 30","Unit 31"];

const unitSelect = document.getElementById('unit');
function populateUnits(list){
  unitSelect.innerHTML = '<option value="">Select your unit…</option>' + list.map(u => `<option value="${u}">${u}</option>`).join('');
}
populateUnits(FALLBACK_UNITS);

async function loadRoster(){
  try{
    const res = await fetch(APPS_SCRIPT_URL + '?_t=' + Date.now(), {cache: 'no-store'});
    const data = await res.json();
    if(data.roster && data.roster.length){
      populateUnits(data.roster.map(r => r.unit));
    }
  }catch(e){ /* keep fallback */ }
}
loadRoster();

let photoBase64 = '';
let photoMime = 'image/jpeg';

function compressImage(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxDim = 1400;
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w > h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
        document.getElementById('preview').src = dataUrl;
        document.getElementById('preview').style.display = 'block';
        resolve(dataUrl.split(',')[1]);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

document.getElementById('photo').addEventListener('change', async function(e){
  const file = e.target.files[0];
  if(!file) return;
  photoMime = 'image/jpeg';
  photoBase64 = await compressImage(file);
});

document.getElementById('receiptForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const errBox = document.getElementById('errBox');
  errBox.style.display = 'none';

  if(!photoBase64){
    errBox.textContent = "Add a photo of the receipt first.";
    errBox.style.display = 'block';
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  const fd = new FormData();
  fd.append('formType', 'receipt');
  fd.append('employee', document.getElementById('employee').value.trim());
  fd.append('unit', document.getElementById('unit').value);
  fd.append('serviceType', document.getElementById('serviceType').value.trim());
  fd.append('serviceMileage', document.getElementById('serviceMileage').value.trim());
  fd.append('vendor', document.getElementById('vendor').value.trim());
  fd.append('cost', document.getElementById('cost').value.trim());
  fd.append('notes', document.getElementById('notes').value.trim());
  fd.append('photo', photoBase64);
  fd.append('photoMime', photoMime);

  try{
    const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: fd });
    const data = await res.json();
    if(!data.ok) throw new Error(data.error || 'Something went wrong');

    document.getElementById('receiptForm').style.display = 'none';
    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('thanksMsg').textContent = 'Thanks — receipt logged for ' + data.unit;
    document.querySelector('#resultBox .msg').textContent = data.baselineUpdated
      ? 'Logged, and the fleet tracker was updated automatically — ' + data.canonicalItem + ' is now current for this unit.'
      : 'Logged to the SFPM Receipts sheet.';
    document.getElementById('againBtn').style.display = 'block';
  }catch(err){
    errBox.textContent = "Couldn't submit that — check your connection and try again.";
    errBox.style.display = 'block';
  }finally{
    btn.disabled = false;
    btn.textContent = 'Submit Receipt';
  }
});

document.getElementById('againBtn').addEventListener('click', function(){
  document.getElementById('receiptForm').reset();
  document.getElementById('preview').style.display = 'none';
  photoBase64 = '';
  document.getElementById('receiptForm').style.display = 'block';
  document.getElementById('resultBox').style.display = 'none';
  this.style.display = 'none';
});
</script>
</body>
</html>
