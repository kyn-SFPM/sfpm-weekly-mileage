<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  if(!params.has('_v')){
    params.set('_v', Date.now());
    window.location.replace(window.location.pathname + '?' + params.toString());
  }
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>SFPM — Fleet Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#121110; --panel:#1c1a17; --panel-alt:#242019;
    --steel:#3a362e; --steel-lt:#514b3e;
    --amber:#c98a3b; --amber-bright:#e0a855;
    --rust:#a63a2e; --rust-bright:#c4523f;
    --olive:#5c6b47; --olive-bright:#7c8f5f;
    --slate:#4a5a63; --slate-bright:#6b8290;
    --text:#ede7d9; --text-muted:#9c9483; --text-dim:#655f52;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:radial-gradient(ellipse at top, rgba(201,138,59,0.06), transparent 60%), var(--bg);
    color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;
  }
  .wrap{max-width:900px;margin:0 auto;padding:24px 16px 80px;}
  .hdr{padding:8px 4px 20px;border-bottom:1px solid var(--steel);margin-bottom:22px;position:relative;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;}
  .hdr::after{content:"";position:absolute;bottom:-1px;left:0;width:64px;height:3px;background:var(--amber);}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--amber);text-transform:uppercase;margin-bottom:6px;}
  h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:26px;letter-spacing:.02em;text-transform:uppercase;margin:0;}
  .refresh{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);cursor:pointer;border:1px solid var(--steel);border-radius:4px;padding:7px 12px;background:var(--panel);}
  .refresh:active{border-color:var(--amber);}
  .stamp{font-size:11px;color:var(--text-dim);margin-top:4px;}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
  .stat{background:var(--panel);border:1px solid var(--steel);border-radius:4px;padding:12px 8px;text-align:center;cursor:pointer;transition:border-color .15s;}
  .stat:active{border-color:var(--steel-lt);}
  .stat.filter-active{border-color:var(--amber);border-width:2px;}
  .stat .n{font-family:'Oswald',sans-serif;font-size:24px;font-weight:600;line-height:1;}
  .stat.overdue .n{color:var(--rust-bright);}
  .stat.due_soon .n{color:var(--amber-bright);}
  .stat.ok .n{color:var(--olive-bright);}
  .stat.no_data .n{color:var(--text-dim);}
  .stat .l{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-top:5px;}

  .loading{text-align:center;padding:60px 0;color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:13px;}

  .card{
    background:linear-gradient(180deg, var(--panel-alt), var(--panel));border:1px solid var(--steel);
    border-left:3px solid var(--steel-lt);border-radius:6px;padding:10px 14px;margin-bottom:7px;
  }
  .card.overdue{border-left-color:var(--rust);}
  .card.due_soon{border-left-color:var(--amber);}
  .card.ok{border-left-color:var(--olive);}
  .card.no_data{border-left-color:var(--text-dim);}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;cursor:pointer;}
  .card-name{font-family:'Oswald',sans-serif;font-size:17px;font-weight:600;text-transform:uppercase;}
  .card-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
  .card-badge{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:3px;font-weight:700;white-space:nowrap;}
  .card-badge.overdue{background:rgba(166,58,46,.2);color:var(--rust-bright);border:1px solid rgba(166,58,46,.5);}
  .card-badge.due_soon{background:rgba(201,138,59,.18);color:var(--amber-bright);border:1px solid rgba(201,138,59,.5);}
  .card-badge.ok{background:rgba(124,143,95,.12);color:var(--olive-bright);border:1px solid rgba(124,143,95,.3);}
  .card-badge.no_data{background:rgba(156,148,131,.12);color:var(--text-dim);border:1px solid rgba(156,148,131,.3);}
  .card-mileage{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);margin-top:6px;}

  .detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--steel);}
  .detail.open{display:block;}
  .ditem{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px solid rgba(58,54,46,.5);}
  .ditem:last-child{border-bottom:none;}
  .ditem .s{font-family:'JetBrains Mono',monospace;font-size:10.5px;text-transform:uppercase;}
  .ditem .s.overdue{color:var(--rust-bright);}
  .ditem .s.due_soon{color:var(--amber-bright);}
  .ditem .s.ok{color:var(--olive-bright);}
  .ditem .s.no_baseline{color:var(--text-dim);}
  .admin-btn{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;
    background:var(--panel-alt);border:1px solid var(--steel);color:var(--text-muted);border-radius:4px;padding:7px 10px;cursor:pointer;
  }
  .admin-btn:active{border-color:var(--amber);color:var(--amber-bright);}
  .view-toggle{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;
    padding:6px 12px;border-radius:20px;border:1px solid var(--steel);background:transparent;color:var(--text-muted);cursor:pointer;
  }
  .view-toggle.active{background:var(--amber);border-color:var(--amber);color:#1a1408;font-weight:600;}
  .service-group{background:var(--panel);border:1px solid var(--steel);border-radius:6px;padding:12px 16px;margin-bottom:8px;}
  .service-group-hdr{display:flex;justify-content:space-between;align-items:center;font-family:'Oswald',sans-serif;font-size:16px;text-transform:uppercase;cursor:pointer;}
  .service-group-hdr.open{margin-bottom:8px;}
  .service-group-count{font-family:'JetBrains Mono',monospace;font-size:11px;}
  .service-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(58,54,46,.5);font-size:13px;}
  .service-row:last-child{border-bottom:none;}
  .service-row .s{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;}
  .service-row .s.overdue{color:var(--rust-bright);}
  .service-row .s.due_soon{color:var(--amber-bright);}
  .overlay{
    display:none;position:fixed;inset:0;background:rgba(8,7,6,.72);z-index:50;
    align-items:flex-end;justify-content:center;
  }
  .overlay.open{display:flex;}
  .sheet{
    background:var(--panel);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;
    border-radius:14px 14px 0 0;border-top:1px solid var(--steel);padding:20px 18px 30px;
    animation:slideup .2s ease-out;
  }
  @keyframes slideup{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .sheet-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;text-transform:uppercase;}
  .close-x{background:none;border:1px solid var(--steel);color:var(--text-muted);width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;}
  .sheet label{display:block;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin:14px 0 5px;}
  .sheet input{
    width:100%;background:var(--panel-alt);border:1px solid var(--steel);border-radius:4px;color:var(--text);
    padding:10px 11px;font-family:'Inter',sans-serif;font-size:14.5px;
  }
  .sheet input:focus{outline:none;border-color:var(--amber);}
  .sheet .btn{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;text-transform:uppercase;letter-spacing:.04em;
    padding:12px;border-radius:4px;border:none;cursor:pointer;width:100%;margin-top:18px;background:var(--amber);color:#1a1408;
  }
  .sheet .btn:disabled{opacity:.5;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <div class="eyebrow">Service First Property Management</div>
      <h1>Fleet Status</h1>
      <div class="stamp" id="stamp"></div>
    </div>
    <button class="refresh" id="refreshBtn">↻ Refresh</button>
  </div>

  <div class="stats" id="statsBox"></div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin:26px 0 10px;cursor:pointer;" onclick="toggleStaleBox()">
    <div style="font-family:'Oswald',sans-serif;font-size:16px;text-transform:uppercase;letter-spacing:.03em;color:var(--amber-bright);">Weekly Reporting <span id="staleSummary" style="color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:none;letter-spacing:0;"></span></div>
    <span id="staleToggleIcon" style="color:var(--text-dim);font-size:12px;">▸</span>
  </div>
  <div id="staleBox" style="display:none;"></div>

  <div id="filterBar" style="display:none;margin-bottom:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--amber-bright);">
    Filtering: <span id="filterLabel"></span> — <span style="text-decoration:underline;cursor:pointer;color:var(--text-muted);" onclick="setStatusFilter(statusFilter)">clear</span>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin:26px 0 10px;">
    <div style="font-family:'Oswald',sans-serif;font-size:16px;text-transform:uppercase;letter-spacing:.03em;color:var(--amber-bright);">By Service</div>
    <div style="display:flex;gap:6px;">
      <button class="view-toggle active" id="viewServiceBtn" onclick="setView('service')">By Service</button>
      <button class="view-toggle" id="viewVehicleBtn" onclick="setView('vehicle')">By Vehicle</button>
    </div>
  </div>
  <div id="content"><div class="loading">Loading fleet status…</div></div>
</div>

<div class="overlay" id="backfillOverlay">
  <div class="sheet">
    <div class="sheet-hdr">
      <div class="sheet-title" id="backfillTitle">Backfill Service</div>
      <button class="close-x" onclick="closeBackfill()">&times;</button>
    </div>

    <label>Which services were done?</label>
    <div id="bf_items" style="margin-bottom:6px;"></div>

    <label>Date Performed</label>
    <input type="date" id="bf_date">

    <label>Mileage at Time of Service</label>
    <input type="number" id="bf_mileage" placeholder="Leave blank to estimate from date">
    <div style="color:var(--text-dim);font-size:11px;margin-top:6px;">All selected items will be set to the same date and mileage.</div>

    <button class="btn" id="bfSubmitBtn" onclick="submitBackfillMulti()">Save Selected</button>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWrnauTI1Kva0YfT-jWyNH5vp5GwMK0wHlr5crl2IERtGbhMOT4Czl0vYAHBwhin9f-Q/exec";

const STATUS_LABEL = { overdue: 'Overdue', due_soon: 'Due Soon', ok: 'OK', no_data: 'No Mileage Yet', no_baseline: 'No Baseline' };

async function load(){
  document.getElementById('content').innerHTML = '<div class="loading">Loading fleet status…</div>';
  try{
    const res = await fetch(APPS_SCRIPT_URL + '?mode=admin&_t=' + Date.now(), {cache: 'no-store'});
    const data = await res.json();
    render(data.fleet);
    document.getElementById('stamp').textContent = 'Updated ' + new Date().toLocaleString();
  }catch(e){
    document.getElementById('content').innerHTML = `<div class="loading">Could not load fleet status. Check your connection and refresh.</div>`;
  }
}

let currentFleet = [];
let currentView = 'service';
let statusFilter = null; // null = default (overdue+due_soon shown), or 'overdue'|'due_soon'|'ok'|'no_data'

function setStatusFilter(status){
  statusFilter = (statusFilter === status) ? null : status;
  render(currentFleet);
}

function render(fleet){
  currentFleet = fleet;
  const active = fleet.filter(f => f.active);
  const counts = { overdue: 0, due_soon: 0, ok: 0, no_data: 0 };
  active.forEach(f => {
    f.items.forEach(i => {
      if(i.status === 'overdue') counts.overdue++;
      else if(i.status === 'due_soon') counts.due_soon++;
      else if(i.status === 'ok') counts.ok++;
      else counts.no_data++;
    });
    f.docItems.forEach(i => {
      if(i.status === 'overdue') counts.overdue++;
      else if(i.status === 'due_soon') counts.due_soon++;
      else if(i.status === 'ok') counts.ok++;
      else counts.no_data++;
    });
  });

  document.getElementById('statsBox').innerHTML = `
    <div class="stat overdue${statusFilter==='overdue'?' filter-active':''}" onclick="setStatusFilter('overdue')"><div class="n">${counts.overdue}</div><div class="l">Overdue Items</div></div>
    <div class="stat due_soon${statusFilter==='due_soon'?' filter-active':''}" onclick="setStatusFilter('due_soon')"><div class="n">${counts.due_soon}</div><div class="l">Due Soon</div></div>
    <div class="stat ok${statusFilter==='ok'?' filter-active':''}" onclick="setStatusFilter('ok')"><div class="n">${counts.ok}</div><div class="l">Up To Date</div></div>
    <div class="stat no_data${statusFilter==='no_data'?' filter-active':''}" onclick="setStatusFilter('no_data')"><div class="n">${counts.no_data}</div><div class="l">No Data Yet</div></div>
  `;

  const stale = fleet.filter(f => f.reportStale && f.active);
  document.getElementById('staleSummary').textContent = stale.length === 0 ? '— all current' : `— ${stale.length} vehicle${stale.length === 1 ? '' : 's'} need to report`;
  document.getElementById('staleBox').innerHTML = stale.length === 0
    ? `<div class="card ok" style="border-left-color:var(--olive);padding:8px 12px;"><div class="card-name" style="font-size:13px;">Everyone's current — no overdue weeklies</div></div>`
    : stale.map(f => `
        <div class="card overdue" style="padding:6px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;" onclick="jumpToVehicle('${esc(f.unit)}')">
          <span class="card-name" style="font-size:12.5px;">${esc(f.unit)}${f.assigned ? ' — ' + esc(f.assigned) : ''}</span>
          <span class="card-mileage" style="margin-top:0;white-space:nowrap;">${f.daysSinceReport === null ? 'Never' : f.daysSinceReport + 'd ago'}</span>
        </div>
      `).join('');

  renderContent();
}

function toggleStaleBox(){
  const box = document.getElementById('staleBox');
  const icon = document.getElementById('staleToggleIcon');
  const showing = box.style.display !== 'none';
  box.style.display = showing ? 'none' : 'block';
  icon.textContent = showing ? '▸' : '▾';
}

function jumpToVehicle(unitName){
  currentView = 'vehicle';
  document.getElementById('viewServiceBtn').classList.remove('active');
  document.getElementById('viewVehicleBtn').classList.add('active');
  renderContent();
  const idx = currentFleet.findIndex(f => f.unit === unitName);
  if(idx === -1) return;
  setTimeout(() => {
    const detail = document.getElementById('detail-' + idx);
    if(detail && !detail.classList.contains('open')) detail.classList.add('open');
    const card = detail ? detail.closest('.card') : null;
    if(card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

function setView(v){
  currentView = v;
  document.getElementById('viewServiceBtn').classList.toggle('active', v === 'service');
  document.getElementById('viewVehicleBtn').classList.toggle('active', v === 'vehicle');
  renderContent();
}

function renderContent(){
  const bar = document.getElementById('filterBar');
  if(statusFilter){
    bar.style.display = 'block';
    document.getElementById('filterLabel').textContent = STATUS_LABEL[statusFilter] || statusFilter;
  } else {
    bar.style.display = 'none';
  }
  if(currentView === 'service') renderByService(currentFleet);
  else renderByVehicle(currentFleet);
}

const SERVICE_ORDER_PRIORITY = ['Insurance', 'Tags/Registration', 'Inspection', 'Oil Change', 'Rotate Tires'];
function serviceOrderIndex(name){
  const idx = SERVICE_ORDER_PRIORITY.indexOf(name);
  return idx === -1 ? 999 : idx;
}

function detailForDoc(i){
  if(i.status === 'overdue') return 'Overdue since ' + i.dateValue;
  if(i.status === 'due_soon') return 'Due ' + i.dateValue;
  if(i.status === 'ok') return i.dateValue;
  return 'No date on file';
}
function detailForMileage(i){
  if(i.status === 'overdue') return 'Overdue by ' + Math.abs(i.remaining).toLocaleString() + ' mi';
  if(i.status === 'due_soon') return 'Due in ' + i.remaining.toLocaleString() + ' mi';
  if(i.status === 'ok') return i.remaining.toLocaleString() + ' mi left';
  return 'No baseline yet';
}

let openGroups = {};

function renderByService(fleet){
  const active = fleet.filter(f => f.active);
  const groups = {};

  function addTo(name, f, status, detail){
    if(!groups[name]) groups[name] = [];
    groups[name].push({ unit: f.unit, assigned: f.assigned, status: status, detail: detail });
  }

  active.forEach(f => {
    f.docItems.forEach(i => addTo(i.item, f, i.status, detailForDoc(i)));
    f.items.forEach(i => addTo(i.item, f, i.status, detailForMileage(i)));
  });

  const matchesFilter = r => statusFilter ? r.status === statusFilter : (r.status === 'overdue' || r.status === 'due_soon');

  const groupNames = Object.keys(groups)
    .filter(name => groups[name].some(matchesFilter))
    .sort((a, b) => {
      const pa = serviceOrderIndex(a), pb = serviceOrderIndex(b);
      if(pa !== pb) return pa - pb;
      return groups[b].filter(matchesFilter).length - groups[a].filter(matchesFilter).length;
    });

  if(groupNames.length === 0){
    const label = statusFilter ? STATUS_LABEL[statusFilter] || statusFilter : 'overdue or due soon';
    document.getElementById('content').innerHTML = `<div class="loading">Nothing matching "${label}" across the active fleet.</div>`;
    return;
  }

  document.getElementById('content').innerHTML = groupNames.map(name => {
    const rows = groups[name].filter(matchesFilter).sort((a, b) => (a.status === 'overdue' ? 0 : 1) - (b.status === 'overdue' ? 0 : 1));
    const overdueN = rows.filter(r => r.status === 'overdue').length;
    const isOpen = !!openGroups[name];
    const safeName = name.replace(/[^a-zA-Z0-9]/g, '_');
    return `
      <div class="service-group">
        <div class="service-group-hdr ${isOpen ? 'open' : ''}" onclick="toggleServiceGroup('${safeName}')">
          <span>${esc(name)}</span>
          <span style="display:flex;align-items:center;gap:8px;">
            <span class="service-group-count" style="color:${overdueN ? 'var(--rust-bright)' : 'var(--amber-bright)'}">${rows.length} vehicle${rows.length === 1 ? '' : 's'}</span>
            <span style="color:var(--text-dim);font-size:11px;">${isOpen ? '▾' : '▸'}</span>
          </span>
        </div>
        <div id="group-${safeName}" style="display:${isOpen ? 'block' : 'none'};">
          ${rows.map(r => `
            <div class="service-row" style="cursor:pointer;" onclick="event.stopPropagation(); jumpToVehicle('${esc(r.unit)}')">
              <span style="text-decoration:underline;text-decoration-color:var(--steel-lt);text-underline-offset:3px;">${esc(r.unit)}${r.assigned ? ' — ' + esc(r.assigned) : ''}</span>
              <span class="s ${r.status}">${esc(r.detail)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function toggleServiceGroup(safeName){
  openGroups[safeName] = !openGroups[safeName];
  renderContent();
}

function renderByVehicle(fleet){
  const matchesFilter = i => statusFilter ? i.status === statusFilter : (i.status === 'overdue' || i.status === 'due_soon');

  const rowsHtml = fleet.map((f, idx) => {
    const worst = f.worst === 'no_baseline' ? 'no_data' : f.worst;
    const allDocItems = f.docItems;
    const allItems = f.items;
    const flaggedDoc = allDocItems.filter(matchesFilter);
    const flaggedMileage = allItems.filter(matchesFilter);
    const okCount = (allDocItems.length - allDocItems.filter(i => i.status === 'overdue' || i.status === 'due_soon').length)
                  + (allItems.length - allItems.filter(i => i.status === 'overdue' || i.status === 'due_soon').length);

    if(statusFilter && flaggedDoc.length === 0 && flaggedMileage.length === 0) return null; // hide non-matching vehicles when filtering

    const rowHtml = (i, isDoc) => `
      <div class="ditem">
        <span>${esc(i.item)}</span>
        <span class="s ${i.status}">${isDoc ? detailForDoc(i) : detailForMileage(i)}</span>
      </div>`;

    return `
      <div class="card ${worst}" style="${f.active ? '' : 'opacity:.55;'}">
        <div class="card-top" onclick="toggle(${idx})">
          <div>
            <div class="card-name">${esc(f.unit)}${f.assigned ? ' — ' + esc(f.assigned) : ''}${f.active ? '' : ' (INACTIVE)'}</div>
            <div class="card-sub">${esc(f.entity || '')} ${esc(f.yearMakeModel || '')}${f.plate ? ' · ' + esc(f.plate) : ''}</div>
            ${f.latestMileage ? `<div class="card-mileage">${Number(f.latestMileage).toLocaleString()} mi as of ${new Date(f.latestDate).toLocaleDateString()}</div>` : `<div class="card-mileage">No mileage logged yet</div>`}
          </div>
          <span class="card-badge ${worst}">${STATUS_LABEL[worst]}${f.overdueCount ? ' (' + f.overdueCount + ')' : ''}</span>
        </div>
        <div class="detail" id="detail-${idx}">
          ${f.vin ? `<div class="ditem"><span>VIN</span><span class="s">${esc(f.vin)}</span></div>` : ''}
          ${flaggedDoc.length === 0 && flaggedMileage.length === 0 ? `<div class="ditem"><span>Nothing due</span><span class="s ok">All ${okCount} items current</span></div>` : ''}
          ${flaggedDoc.map(i => rowHtml(i, true)).join('')}
          ${flaggedMileage.map(i => rowHtml(i, false)).join('')}

          ${!statusFilter ? `
          <div id="full-list-${idx}" style="display:none;margin-top:8px;">
            ${allDocItems.map(i => rowHtml(i, true)).join('')}
            ${allItems.map(i => rowHtml(i, false)).join('')}
          </div>
          ${okCount > 0 ? `<div style="margin-top:8px;"><button class="admin-btn" onclick="event.stopPropagation(); toggleFullList(${idx})" id="full-list-btn-${idx}">Show full checklist (${okCount} more)</button></div>` : ''}
          ` : ''}

          <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--steel);display:flex;gap:8px;flex-wrap:wrap;">
            <button class="admin-btn" onclick="event.stopPropagation(); setActive('${esc(f.unit)}', ${!f.active})">${f.active ? 'Mark Inactive' : 'Mark Active'}</button>
            <button class="admin-btn" onclick="event.stopPropagation(); openBackfill('${esc(f.unit)}')">Backfill Known Service Date</button>
          </div>
        </div>
      </div>
    `;
  }).filter(Boolean);

  document.getElementById('content').innerHTML = rowsHtml.length
    ? rowsHtml.join('')
    : `<div class="loading">Nothing matching that filter across the fleet.</div>`;
}

function toggleFullList(idx){
  const box = document.getElementById('full-list-' + idx);
  const btn = document.getElementById('full-list-btn-' + idx);
  const showing = box.style.display !== 'none';
  if(showing){
    box.style.display = 'none';
    btn.textContent = btn.dataset.origLabel;
  } else {
    btn.dataset.origLabel = btn.textContent;
    box.style.display = 'block';
    btn.textContent = 'Hide full checklist';
  }
}

async function setActive(unit, active){
  if(!confirm((active ? 'Mark ' : 'Mark ') + unit + (active ? ' active again?' : ' inactive? It will be excluded from weekly reporting checks.'))) return;
  const fd = new FormData();
  fd.append('formType', 'setActive');
  fd.append('unit', unit);
  fd.append('active', active);
  await fetch(APPS_SCRIPT_URL, { method: 'POST', body: fd });
  load();
}

const ALL_SERVICE_ITEMS = ['Oil Change','Rotate Tires','Full Check Up','Flush Radiator Fluid','Flush Transmission Fluid','Fuel Injector Maintenance','Replace Air Filter','Replace Fuel Filter','Check Alignment','Replace Spark Plugs'];
let backfillUnit = null;

function openBackfill(unit){
  backfillUnit = unit;
  document.getElementById('backfillTitle').textContent = 'Backfill Service — ' + unit;
  document.getElementById('bf_date').value = '';
  document.getElementById('bf_mileage').value = '';
  document.getElementById('bf_items').innerHTML = ALL_SERVICE_ITEMS.map((item, i) => `
    <label style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--steel);cursor:pointer;">
      <input type="checkbox" class="bf-item-check" value="${item}" style="width:auto;accent-color:var(--amber);">
      <span style="font-size:14px;">${item}</span>
    </label>
  `).join('');
  document.getElementById('backfillOverlay').classList.add('open');
}

function closeBackfill(){
  document.getElementById('backfillOverlay').classList.remove('open');
}

async function submitBackfillMulti(){
  const checked = Array.from(document.querySelectorAll('.bf-item-check:checked')).map(c => c.value);
  const date = document.getElementById('bf_date').value.trim();
  const mileage = document.getElementById('bf_mileage').value.trim();

  if(checked.length === 0){
    alert('Select at least one service item.');
    return;
  }
  if(!mileage && !date){
    alert('Enter a date (to estimate mileage) or a mileage directly.');
    return;
  }

  const btn = document.getElementById('bfSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  const results = [];
  for(const item of checked){
    const fd = new FormData();
    fd.append('formType', 'backfillService');
    fd.append('unit', backfillUnit);
    fd.append('serviceItem', item);
    fd.append('mileage', mileage);
    fd.append('date', date);
    try{
      const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: fd });
      const data = await res.json();
      results.push(item + ': ' + (data.ok ? 'saved' : 'FAILED — ' + data.error));
    }catch(err){
      results.push(item + ': FAILED — ' + err.message);
    }
  }

  btn.disabled = false;
  btn.textContent = 'Save Selected';
  closeBackfill();
  load();
  alert('Backfilled for ' + backfillUnit + ':\\n\\n' + results.join('\\n'));
}

function toggle(idx){
  document.getElementById('detail-' + idx).classList.toggle('open');
}

function esc(s){
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

document.getElementById('refreshBtn').addEventListener('click', load);
load();
</script>
</body>
</html>
